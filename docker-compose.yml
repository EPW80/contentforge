services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: contentforge
      POSTGRES_PASSWORD: contentforge
      POSTGRES_DB: contentforge
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U contentforge -d contentforge']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: contentforge
      MINIO_ROOT_PASSWORD: contentforge
    # Host ports 9000/9001 are taken by another project's MinIO
    # (cutflow-minio-1), mirroring the Postgres 5432/5433 conflict — use 9002/9003.
    ports:
      - '9002:9000'
      - '9003:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 contentforge contentforge &&
      mc mb --ignore-existing local/contentforge
      "

volumes:
  pgdata:
  miniodata:
